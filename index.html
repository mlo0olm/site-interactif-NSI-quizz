<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Quizz NSI</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <h1>Quizz</h1>
    <p id="question">hello</p>
    <fieldset>
    <legend id="texte_fieldset">Sélectionnez une réponse :</legend>
    <div>
        <div id="possibilites">
            <div>
                <input type="radio" name="réponse" id="reponse1" value="réponse 1">
                <label for="reponse1" id="label1">réponse 1</label>
            </div>

            <div>
                <input type="radio" name="réponse" id="reponse2" value="réponse 2">
                <label for="reponse2" id="label2">réponse 2</label>
            </div>

            <div>
                <input type="radio" name="réponse" id="reponse3" value="réponse 3">
                <label for="reponse3" id="label3">réponse 3</label>
            </div>
        </div>
		<p id="correct" hidden>Bonne réponse !</p>
		<p id="incorrect" hidden>Mauvaise réponse...</p>
		<p id="choose_element" hidden>Veuillez sélectionner une réponse avant de valider</p>
        <button id="button_reponse">
            Valider
        </button>
		<button id="button_skip" hidden>
            Passer
        </button>
		<button id="button_next" hidden>
            Question suivante
        </button>

		<div id="end" hidden>
            <p>Bravo, vous avez terminé le questionnaire !</p>
            <p id="score"></p>
        </div>

    </div>
    </fieldset>

</body>
</html>

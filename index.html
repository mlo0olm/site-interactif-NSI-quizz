<!DOCTYPE html>
<!-- 100101011001011000001110011111010111010011110011100000100110111011111101110111001111010011100101111010111100101000001000011110111111101011100100110010111100101110100 -->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Quiz NSI</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <h1>Quiz</h1>

    <div id="start">
        <p>Entrée votre nom : </p>
        <input type="text" class="input_start" id="name">
        <p>nombre de quetions : </p>
        <input type="number" class="input_start" id="number" value="10">
        <div style="height: 16px;">

        </div>
        <button id="Validation" type="button" >
            Valider
        </button>

    </div>

    <div id="frame1">
        <div id="champ_question">
            <p id="question">hello</p>
        </div>
        <fieldset id="texte_fieldset">
        <legend>Sélectionnez une réponse :</legend>
        <div>
            <div id="possibilites">
                <div>
                    <input type="radio" name="réponse" id="reponse1" value="réponse 1">
                    <label for="reponse1"></label>
                </div>

                <div>
                    <input type="radio" name="réponse" id="reponse2" value="réponse 2">
                    <label for="reponse2"></label>
                </div>

                <div>
                    <input type="radio" name="réponse" id="reponse3" value="réponse 3">
                    <label for="reponse3"></label>
                </div>
            </div>

            <div id="messages">
                <p id="correct" hidden>Bonne réponse !</p>
                <p id="incorrect" hidden>Mauvaise réponse...</p>
                <p id="choose_element" hidden>Sélectionnez une réponse</p>
            </div>

            <button id="button_reponse" type="button">
                ok
            </button>

            <button id="button_skip" type="button">
                Passer
            </button>

            <button id="button_next" type="button" hidden>
                Question suivante
            </button>
        </div>
    </div>
    </fieldset>

    <div id="end" hidden>
        <h2>Quiz terminé !</h2>
        <p id="paragraphe_name"></p>
        <p id="score"></p>
    </div>

</body>
</html>
